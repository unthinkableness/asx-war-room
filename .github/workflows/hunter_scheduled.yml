name: ASX Momentum Hunter - Scheduled Scan

on:
  schedule:
    # Runs every 5 mins (tightest free tier) during ASX hours
    - cron: '*/5 0-7 * * 1-5'
  workflow_dispatch:
    # Allows manual triggering from GitHub UI

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Orchestrator (Live Mode)
        env:
          ASX_USER: ${{ secrets.ASX_USER }}
          ASX_PASS: ${{ secrets.ASX_PASS }}
          HOTCOPPER_USER: ${{ secrets.HOTCOPPER_USER }}
          HOTCOPPER_PASS: ${{ secrets.HOTCOPPER_PASS }}
          DRY_RUN: "False"
        run: python orchestrator.py --live

      - name: Commit and Push Data Updates
        run: |
          git config --global user.name "Hunter-Bot"
          git config --global user.email "bot@asx-hunter.local"
          git add data/*.json
          git commit -m "Automated Data Sync: $(date)" || echo "No changes to commit"
          git push
